<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="{{queue_retry_seconds}}">
    <title>{{title}} Queue</title>
    <link rel="stylesheet" href="/theme/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-amber-950 flex items-center justify-center p-6 font-sans antialiased">
    <main class="w-full max-w-md bg-white/95 backdrop-blur rounded-2xl shadow-2xl p-8 ring-1 ring-slate-200">
        <div class="text-5xl text-center mb-4">⏳</div>
        <h1 class="text-3xl font-bold text-center text-slate-900 mb-2">FreeWiFi is full</h1>
        <p class="text-center text-slate-600 mb-6">Too many guests are online right now. Please stay connected to WiFi and try again soon.</p>
        <section class="rounded-xl bg-amber-50 border border-amber-200 p-4 text-sm text-amber-900 mb-4">
            This page will refresh automatically in {{queue_retry_seconds}} seconds.
        </section>
        <p class="text-center text-xs text-slate-500">Active sessions: {{active_sessions}} / {{max_active_sessions}}</p>
    </main>
</body>
</html>
