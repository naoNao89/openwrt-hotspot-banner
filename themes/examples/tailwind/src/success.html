<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Connected</title>
    <link rel="stylesheet" href="/theme/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-900 via-emerald-800 to-slate-900 flex items-center justify-center p-6 font-sans antialiased">
    <main class="w-full max-w-md bg-white/95 backdrop-blur rounded-2xl shadow-2xl p-8 ring-1 ring-slate-200 text-center">
        <div class="text-5xl mb-4">✅</div>
        <h1 class="text-3xl font-bold text-slate-900 mb-2">You're connected</h1>
        <p class="text-slate-600 mb-6">Internet access is unlocked. Enjoy your session.</p>
        <p class="text-xs text-slate-500">Active sessions: {{active_sessions}} / {{max_active_sessions}}</p>
    </main>
</body>
</html>
