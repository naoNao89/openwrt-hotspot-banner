# Static dnsmasq snippet for the captive-portal guest network.
#
# Why a static file, not UCI?
#
# OpenWrt's UCI dhcp.guest section only emits a dhcp-range= when netifd
# reports the `guest` interface as up. On QSDK-derived firmware (e.g. CMCC
# RAX3000QY) the vendor wifi stack lacks the standard pre/post_wifi_updown
# hooks, so netifd never sees `guest` come up — and dnsmasq never serves DHCP
# on br-guest. Phones associate, fail DHCP, disassociate after ~30s.
#
# Shipping this file directly in dnsmasq.d/ sidesteps netifd entirely.
# bind-dynamic so dnsmasq tolerates br-guest being created/destroyed.
#
# Override values via /etc/config/hotspot-fas (init script regenerates if
# guest_ip / guest_iface differ from defaults below).

interface=br-guest
bind-dynamic
# Use `set:` (not `tag:`). `tag:br-guest` would FILTER on a tag that nothing
# sets, so dnsmasq silently ignores DHCP requests from br-guest. `set:br-guest`
# auto-tags requests arriving on this interface and binds them to this range.
dhcp-range=set:br-guest,192.168.28.100,192.168.28.150,255.255.255.0,1h
dhcp-option=tag:br-guest,3,192.168.28.1
dhcp-option=tag:br-guest,6,192.168.28.1
