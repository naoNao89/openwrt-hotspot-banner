<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} Router Test Theme</title>
    <link rel="stylesheet" href="/theme/style.css">
</head>
<body>
    <main class="card custom-test-theme">
        <div class="wifi-icon">🧪</div>
        <h1>{{title}}</h1>
        <p class="subtitle">Router package-oriented custom theme is active.</p>
        <section class="notice">CUSTOM_THEME_ACTIVE</section>
        <form method="GET" action="{{accept_url}}">
            <button type="submit">Connect & Start Internet</button>
        </form>
        <p class="terms">Active sessions: {{active_sessions}} / {{max_active_sessions}}</p>
    </main>
</body>
</html>
