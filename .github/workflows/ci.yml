name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  native:
    name: Native CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run CI checks
        run: make ci

  docker:
    name: Docker CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build CI image
        run: make ci-docker

  openwrt-rootfs:
    name: OpenWrt rootfs ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - x86_64-22.03.7
          - x86_64-23.05.6
          - x86_64-24.10.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Smoke test scripts in OpenWrt rootfs
        run: |
          docker run --rm \
            -v "$PWD:/work:ro" \
            -w /work \
            openwrt/rootfs:${{ matrix.version }} \
            /bin/ash -c '
              cat /etc/openwrt_release
              ash -n deploy.sh
              ash -n openwrt-config/harden-router-services.sh
              ash -n openwrt-config/hotspot-firewall.sh
              ash -n openwrt-config/iptables-captive.sh
              ash -n openwrt-config/setup-router.sh
              ash -n openwrt-config/uci-guest-setup.sh
              ash -n openwrt-package/openwrt-hotspot-banner/files/etc/init.d/hotspot-fas
              ash -n openwrt-package/openwrt-hotspot-banner/files/etc/hotplug.d/iface/99-hotspot-guest
              ash -n openwrt-package/openwrt-hotspot-banner/files/usr/lib/hotspot-banner/hotspot-firewall.sh
              ash -n openwrt-package/openwrt-hotspot-banner/files/usr/lib/hotspot-banner/setup-router.sh
              ash -n openwrt-package/openwrt-hotspot-banner/files/usr/lib/hotspot-banner/uci-guest-setup.sh
              ash -n openwrt-package/openwrt-hotspot-banner/files-entware/opt/etc/init.d/S99hotspot-fas
              ash -n scripts/build-ipk.sh
              ash -n scripts/build-ipk-all.sh
              ash -n scripts/check-shell.sh
              ash -n scripts/deploy-package-test.sh
              ash -n scripts/router-ipk-test.sh
              ash -n scripts/router-ipk-remove-test.sh
              ash -n scripts/test-router.sh
              ash -n scripts/live-queue-e2e.sh
              RUN_LIVE_QUEUE_E2E=0 ash scripts/live-queue-e2e.sh
            '

  qemu-openwrt:
    name: QEMU OpenWrt smoke ${{ matrix.profile }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: home-router-150mb
            memory_mb: 150
          - profile: router-250mb
            memory_mb: 250
          - profile: router-1gb
            memory_mb: 1024
          - profile: router-4gb
            memory_mb: 4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install QEMU tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools openssh-client qemu-system-x86
          go install github.com/rakyll/hey@v0.1.4
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install Rust for QEMU binary
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build QEMU runtime binary
        run: cargo build --target x86_64-unknown-linux-musl --release

      - name: Boot OpenWrt and run smoke checks
        env:
          QEMU_MEMORY_MB: ${{ matrix.memory_mb }}
        run: ./scripts/qemu-openwrt-smoke.sh

      - name: Upload QEMU benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-benchmarks-${{ matrix.profile }}
          path: .qemu-openwrt/benchmarks/
          if-no-files-found: warn

  ipk-build:
    name: Build .ipk (${{ matrix.target.id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: arm_cortex-a7_neon-vfpv4
            rust_target: armv7-unknown-linux-musleabihf
            opkg_arch: arm_cortex-a7_neon-vfpv4
            linker_env: CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER
            linker: arm-linux-gnueabihf-gcc
            apt_packages: gcc-arm-linux-gnueabihf
            profile: openwrt
          - id: aarch64_cortex-a53
            rust_target: aarch64-unknown-linux-musl
            opkg_arch: aarch64_cortex-a53
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
            profile: openwrt
          - id: aarch64_generic
            rust_target: aarch64-unknown-linux-musl
            opkg_arch: aarch64_generic
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
            profile: openwrt
          - id: x86_64
            rust_target: x86_64-unknown-linux-musl
            opkg_arch: x86_64
            linker_env: CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER
            linker: musl-gcc
            apt_packages: musl-tools
            profile: openwrt
          - id: entware-aarch64
            rust_target: aarch64-unknown-linux-musl
            opkg_arch: aarch64-3.10
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
            profile: entware
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust (${{ matrix.target.rust_target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ipk-${{ matrix.target.id }}

      - name: Install cross
        run: |
          if ! command -v cross >/dev/null 2>&1; then
              cargo install cross --locked --version 0.2.5
          fi

      - name: Neutralize local zig-linker config for cross
        run: |
          # The repo's .cargo/config.toml pins armv7 to ./zig-linker.sh for
          # local Mac builds. Cross runs inside its own Docker image and has
          # its own (musl) linker, so strip the local override during CI.
          if [ -f .cargo/config.toml ]; then
              mv .cargo/config.toml .cargo/config.toml.local
          fi

      - name: Cross-build release binary
        run: cross build --target ${{ matrix.target.rust_target }} --release

      - name: Package .ipk
        env:
          SKIP_BUILD: "1"
          TARGET: ${{ matrix.target.rust_target }}
          PKG_ARCH: ${{ matrix.target.opkg_arch }}
          INSTALL_PROFILE: ${{ matrix.target.profile }}
        run: ./scripts/build-ipk.sh

      - name: Verify .ipk format
        env:
          PKG_ARCH: ${{ matrix.target.opkg_arch }}
          PROFILE: ${{ matrix.target.profile }}
        run: |
          set -e
          IPK="$(ls target/ipk/openwrt-hotspot-banner_*_${PKG_ARCH}.ipk | head -1)"
          echo "IPK=$IPK"
          file "$IPK" | tee /tmp/ipk-file.txt
          grep -q 'gzip compressed' /tmp/ipk-file.txt
          tar -tzf "$IPK" | sort | tee /tmp/ipk-outer.txt
          grep -qx './debian-binary' /tmp/ipk-outer.txt
          grep -qx './control.tar.gz' /tmp/ipk-outer.txt
          grep -qx './data.tar.gz' /tmp/ipk-outer.txt
          mkdir -p /tmp/ipkx && tar -xzf "$IPK" -C /tmp/ipkx
          tar -xzf /tmp/ipkx/control.tar.gz -C /tmp/ipkx ./control
          grep -q '^Package: openwrt-hotspot-banner$' /tmp/ipkx/control
          grep -q "^Architecture: ${PKG_ARCH}$" /tmp/ipkx/control
          tar -tzf /tmp/ipkx/data.tar.gz | tee /tmp/ipk-data.txt
          if [ "$PROFILE" = "openwrt" ]; then
            for required in \
              ./usr/bin/hotspot-fas \
              ./etc/init.d/hotspot-fas \
              ./etc/config/hotspot-fas \
              ./etc/hotplug.d/iface/99-hotspot-guest \
              ./usr/share/hotspot-banner/default-theme/index.html \
              ./usr/share/hotspot-banner/default-theme/queue.html \
              ./usr/share/hotspot-banner/default-theme/success.html \
              ./usr/share/hotspot-banner/default-theme/style.css \
              ./etc/hotspot-banner/theme/index.html \
              ./usr/lib/hotspot-banner/hotspot-firewall.sh; do
              grep -qx "$required" /tmp/ipk-data.txt || { echo "missing in ipk: $required"; exit 1; }
            done
          else
            for required in \
              ./opt/bin/hotspot-fas \
              ./opt/etc/init.d/S99hotspot-fas \
              ./opt/etc/hotspot-fas.conf \
              ./opt/etc/hotspot-banner/theme/index.html \
              ./opt/share/hotspot-banner/default-theme/index.html \
              ./opt/share/hotspot-banner/default-theme/queue.html \
              ./opt/share/hotspot-banner/default-theme/success.html \
              ./opt/share/hotspot-banner/default-theme/style.css; do
              grep -qx "$required" /tmp/ipk-data.txt || { echo "missing in ipk: $required"; exit 1; }
            done
          fi

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-hotspot-banner-${{ matrix.target.id }}
          path: target/ipk/openwrt-hotspot-banner_*_${{ matrix.target.opkg_arch }}.ipk
          if-no-files-found: error

  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify env template policy
        run: |
          test -f .env.example
          git check-ignore -q .env
          ! git ls-files --error-unmatch .env >/dev/null 2>&1
          grep -Fqx '.env' .dockerignore
          grep -Fqx '.env.*' .dockerignore

      - name: Ensure live router scripts are guarded
        run: |
          grep -q 'ROUTER_IP="${ROUTER_IP:-}"' deploy.sh
          grep -q 'ROUTER_HOST="${ROUTER_HOST:-}"' scripts/test-router.sh
          grep -q 'RUN_LIVE_QUEUE_E2E' scripts/live-queue-e2e.sh
          grep -q 'SKIP live queue E2E is guarded' scripts/live-queue-e2e.sh

      - name: Check README fences
        run: python3 -c 'from pathlib import Path; text = Path("README.md").read_text(); fence = chr(96) * 3; assert text.count(fence) % 2 == 0'

      - name: Verify packaging targets stay in sync with CI matrix
        run: |
          python3 - <<'PY'
          import json, re, sys, pathlib
          targets = json.loads(pathlib.Path("packaging/targets.json").read_text())
          ci = pathlib.Path(".github/workflows/ci.yml").read_text()
          missing = [t["id"] for t in targets if not t.get("ci_skip") and f"id: {t['id']}" not in ci]
          if missing:
              print("Targets missing from CI matrix:", missing)
              sys.exit(1)
          print(f"OK: {len(targets)} targets in sync with CI matrix")
          PY
