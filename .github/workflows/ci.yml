name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  native:
    name: Native CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run CI checks
        run: make ci

  docker:
    name: Docker CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build CI image
        run: make ci-docker

  openwrt-rootfs:
    name: OpenWrt rootfs ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - x86_64-22.03.7
          - x86_64-23.05.6
          - x86_64-24.10.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Smoke test scripts in OpenWrt rootfs
        run: |
          docker run --rm \
            -v "$PWD:/work:ro" \
            -w /work \
            openwrt/rootfs:${{ matrix.version }} \
            /bin/ash -c '
              cat /etc/openwrt_release
              ash -n deploy.sh
              ash -n openwrt-config/harden-router-services.sh
              ash -n openwrt-config/hotspot-firewall.sh
              ash -n openwrt-config/iptables-captive.sh
              ash -n openwrt-config/setup-router.sh
              ash -n openwrt-config/uci-guest-setup.sh
              ash -n scripts/check-shell.sh
              ash -n scripts/test-router.sh
              ash -n scripts/live-queue-e2e.sh
              RUN_LIVE_QUEUE_E2E=0 ash scripts/live-queue-e2e.sh
            '

  qemu-openwrt:
    name: QEMU OpenWrt smoke ${{ matrix.profile }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: home-router-150mb
            memory_mb: 150
          - profile: router-250mb
            memory_mb: 250
          - profile: router-1gb
            memory_mb: 1024
          - profile: router-4gb
            memory_mb: 4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install QEMU tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools openssh-client qemu-system-x86

      - name: Install Rust for QEMU binary
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build QEMU runtime binary
        run: cargo build --target x86_64-unknown-linux-musl --release

      - name: Boot OpenWrt and run smoke checks
        env:
          QEMU_MEMORY_MB: ${{ matrix.memory_mb }}
        run: ./scripts/qemu-openwrt-smoke.sh

  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify env template policy
        run: |
          test -f .env.example
          git check-ignore -q .env
          ! git ls-files --error-unmatch .env >/dev/null 2>&1
          grep -Fqx '.env' .dockerignore
          grep -Fqx '.env.*' .dockerignore

      - name: Ensure live router scripts are guarded
        run: |
          grep -q 'ROUTER_IP="${ROUTER_IP:-}"' deploy.sh
          grep -q 'ROUTER_HOST="${ROUTER_HOST:-}"' scripts/test-router.sh
          grep -q 'RUN_LIVE_QUEUE_E2E' scripts/live-queue-e2e.sh
          grep -q 'SKIP live queue E2E is guarded' scripts/live-queue-e2e.sh

      - name: Check README fences
        run: python3 -c 'from pathlib import Path; text = Path("README.md").read_text(); fence = chr(96) * 3; assert text.count(fence) % 2 == 0'
